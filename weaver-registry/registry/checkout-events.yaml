groups:
  # ---------------------------------------------------------------------------
  # Checkout span event attribute groups
  #
  # The checkoutservice.PlaceOrder span emits four named events during the
  # order lifecycle. Each event carries its own attributes defined here.
  # In code these are added via span.AddEvent("<name>", trace.WithAttributes(...))
  # ---------------------------------------------------------------------------

  - id: registry.checkout.event.prepared
    type: attribute_group
    brief: "Attributes on the 'prepared' span event emitted by checkoutservice."
    stability: development
    attributes:
      - id: checkout.currency
        type: string
        stability: development
        brief: >
          The ISO 4217 currency code selected by the user for the order.
          Emitted on the `prepared` span event after the cart has been fetched
          and currency conversion has been requested.
        examples: ["USD", "EUR", "JPY", "GBP", "CAD"]
        requirement_level: required

  - id: registry.checkout.event.charged
    type: attribute_group
    brief: "Attributes on the 'charged' span event emitted by checkoutservice."
    stability: development
    attributes:
      - id: checkout.charge_total
        type: double
        stability: development
        brief: >
          The total monetary amount (in the user's selected currency) charged
          to the payment instrument. Emitted on the `charged` span event after
          `paymentservice.Charge` returns successfully.
        examples: [42.99, 0.99, 1250.00]
        requirement_level: required

  - id: registry.checkout.event.shipped
    type: attribute_group
    brief: "Attributes on the 'shipped' span event emitted by checkoutservice."
    stability: development
    attributes:
      - id: checkout.item_count
        type: int
        stability: development
        brief: >
          The total number of distinct line items included in the shipment.
          Emitted on the `shipped` span event after `shippingservice.ShipOrder`
          returns a tracking ID.
        examples: [1, 3, 10]
        requirement_level: required

      - id: checkout.order_items
        type: string
        stability: development
        brief: >
          A string-serialized representation of the order's line items,
          including product IDs and quantities. Emitted on the `shipped` span
          event. The format is language-specific (Go struct default formatter).
        examples:
          - "[{OLJCESPC7Z 2} {66VCHSJNUP 1}]"
          - "[{1YMWWN1N4O 1}]"
        requirement_level: recommended

  - id: registry.checkout.event.discounted
    type: attribute_group
    brief: "Attributes on the 'discounted' span event emitted by checkoutservice."
    stability: development
    attributes:
      - id: checkout.discount
        type: string
        stability: development
        brief: >
          The discount value returned by the mock `getDiscounts` SQL call in
          checkoutservice. The value is a synthetic string used for
          demonstration purposes; its artificial latency grows as `app.cache_size`
          increases, simulating slow discount lookups tied to the memory leak.
        examples: ["10%", "5.00", "PROMO2024"]
        requirement_level: recommended

  # ---------------------------------------------------------------------------
  # Recommendation service attribute group
  # ---------------------------------------------------------------------------
  - id: registry.recommendation.response
    type: attribute_group
    brief: "Attributes describing the response from recommendationservice."
    stability: development
    attributes:
      - id: recommendations.num_products
        type: int
        stability: development
        brief: >
          The number of product IDs returned by the `ListRecommendations` RPC.
          Set on the span in the frontend's `getRecommendations` function after
          the gRPC call completes.
        examples: [0, 4, 10]
        requirement_level: recommended
